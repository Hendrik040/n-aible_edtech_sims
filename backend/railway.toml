[build]
builder = "nixpacks"

[deploy]
startCommand = "cd database && alembic upgrade head && cd .. && python -m uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[environments.production]
variables = { 
  ENVIRONMENT = "production",
  PYTHONPATH = "/app"
}
